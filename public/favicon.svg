<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Box with rounded corners and slight border -->
  <rect x="24" y="24" width="464" height="464" rx="100" fill="white" stroke="#E2E8F0" stroke-width="12" />
  
  <!-- Add subtle inner shadow / outline -->
  <rect x="36" y="36" width="440" height="440" rx="88" stroke="#0F172A" stroke-width="6" stroke-opacity="0.9" />

  <!-- Cyan bracket shape (left piece) -->
  <path d="M 235 150 L 140 245 C 130 255 130 270 140 280 L 195 335 L 260 270 L 220 230 C 210 220 210 205 220 195 L 260 155 C 270 145 285 145 295 155 Z" fill="url(#cyan_gradient)" />

  <path d="M 210 335 L 250 295 L 305 350 Z" fill="url(#cyan_gradient)" />

  <!-- The actual shape is interlocking chevrons forming a stylized hexagon / infinity -->
  <!-- Let's map it out precisely to match the image abstraction: -->
  
  <!-- Cyan/Blue part -->
  <path d="M 240.2 120 L 120 240.2 L 200 320.2 L 280.2 240.2 L 240.2 200.2 L 200.2 240.2 L 180.2 220.2 L 240.2 160.2 L 300.2 220.2 Z" fill="url(#cyan_gradient)" />
  <polygon points="175,225 210,190 230,210 195,245" fill="none" />

  <!-- Green part -->
  <path d="M 271.8 392 L 392 271.8 L 312 191.8 L 231.8 271.8 L 271.8 311.8 L 311.8 271.8 L 331.8 291.8 L 271.8 351.8 L 211.8 291.8 Z" fill="url(#green_gradient)" />

  <!-- The middle arrows from the prompt image -->
  <!-- Left pointing cyan arrow -->
  <polygon points="190,240 230,225 230,255" fill="#00D4FF" />
  <!-- Right pointing green arrow -->
  <polygon points="322,272 282,257 282,287" fill="#34D399" />

  <!-- Overlay simple interlocking thick shapes since the above trace is an approximation -->
  <g fill="none" stroke-width="48" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 270 150 L 150 270 L 230 350 L 310 270" stroke="url(#cyan_gradient)" />
    <path d="M 242 362 L 362 242 L 282 162 L 202 242" stroke="url(#green_gradient)" />
  </g>
  
  <!-- Let's just create an authentic, highly robust SVG using paths that cleanly mimic it -->
  <path d="M 256 96 L 128 224 L 208 304 L 248 264 C 236 250 236 230 248 216 L 312 152 Z" fill="url(#cyan_gradient)" />
  <path d="M 256 416 L 384 288 L 304 208 L 264 248 C 276 262 276 282 264 296 L 200 360 Z" fill="url(#green_gradient)" />

  <!-- Middle Arrows -->
  <path d="M 180 256 L 220 226 L 220 286 Z" fill="#00D4FF" />
  <path d="M 332 256 L 292 286 L 292 226 Z" fill="#34D399" />

  <defs>
    <!-- Cyan to Blue Gradient -->
    <linearGradient id="cyan_gradient" x1="120" y1="120" x2="310" y2="310" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5FF"/>
      <stop offset="1" stop-color="#0066FF"/>
    </linearGradient>

    <!-- Green to Emerald Gradient -->
    <linearGradient id="green_gradient" x1="200" y1="200" x2="390" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>
</svg>
